<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdn.tailwindcss.com"></script><title>Memory & DB</title></head><body class="min-h-screen bg-slate-950 text-slate-100"><div class="w-full p-6 md:p-10"><div class="flex items-end justify-between gap-4 mb-6"><div><h1 class="text-3xl font-bold">Memory & Database</h1><p class="text-slate-400">What I can see right now.</p></div></div><div class="grid lg:grid-cols-2 gap-6"><section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-5"><h2 class="text-xl font-semibold mb-3">Memory</h2><div class="space-y-3"><div class="rounded-xl bg-slate-950/70 p-4"><div class="text-slate-400 text-sm">Name</div><div class="text-lg">Luke Rutley</div></div><div class="rounded-xl bg-slate-950/70 p-4"><div class="text-slate-400 text-sm">Girlfriend</div><div class="text-lg">Phoeebs</div></div></div></section><section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-5"><h2 class="text-xl font-semibold mb-3">Database tables</h2><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400"><tr><th class="text-left py-2 pr-4">Table</th><th class="text-left py-2 pr-4">Columns</th><th class="text-left py-2 pr-4">Rows</th></tr></thead><tbody id="rows" class="divide-y divide-slate-800"></tbody></table></div></section></div></div><script>const data=[["app_metadata","key,value,updated_at",1],["customers","id,name,email,phone,company,notes,created_at",5],["journal_entries","id,title,content,mood,created_at,updated_at",2],["quote_customers","quote_id,customer_id",0],["quotes","id,quote,author,source,tags,price,created_at",6],["saved_pages","id,title,html,created_at,last_accessed_at",8],["sqlite_sequence","name,seq",3]];rows.innerHTML=data.map(([a,b,c])=>`<tr><td class="py-2 pr-4 font-medium">${a}</td><td class="py-2 pr-4 text-slate-300">${b}</td><td class="py-2 pr-4 text-slate-300">${c}</td></tr>`).join('')</script></body></html>
