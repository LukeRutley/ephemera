<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="w-full px-4 md:px-8 py-4 md:py-8">
    <div class="flex items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold">Everything in memory</h1>
        <p class="text-slate-400 text-sm">Current SQLite tables and contents</p>
      </div>
      <button id="refresh" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700">Refresh</button>
    </div>
    <div id="out" class="space-y-4"></div>
  </div>

  <script>
    const out = document.getElementById('out');
    const refresh = document.getElementById('refresh');
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
    async function api(sql, params=[]) {
      const r = await fetch('/api/db/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sql, params})});
      return r.json();
    }
    async function load() {
      out.innerHTML = '<div class="text-slate-400">Loading...</div>';
      const schema = await (await fetch('/api/db/schema')).json();
      const tables = schema.objects.filter(o => o.type === 'table').map(o => o.name).filter(n => !n.startsWith('sqlite_'));
      const parts = await Promise.all(tables.map(async t => {
        const d = await api(`SELECT * FROM "${t}" ORDER BY rowid DESC`);
        return {t, cols: d.columns, rows: d.rows};
      }));
      out.innerHTML = parts.map(({t, cols, rows}) => `
        <section class="bg-slate-900/80 border border-slate-800 rounded-2xl overflow-hidden">
          <div class="p-4 border-b border-slate-800 flex items-center justify-between">
            <h2 class="font-semibold">${esc(t)}</h2>
            <span class="text-xs text-slate-400">${rows.length} rows</span>
          </div>
          <div class="overflow-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-950/60 text-slate-400">
                <tr>${cols.map(c=>`<th class="text-left font-medium p-3 whitespace-nowrap">${esc(c)}</th>`).join('')}</tr>
              </thead>
              <tbody>
                ${rows.map(r=>`<tr class="border-t border-slate-800/70 hover:bg-slate-800/40">${cols.map(c=>`<td class="p-3 align-top whitespace-pre-wrap">${esc(r[c])}</td>`).join('')}</tr>`).join('') || `<tr><td class="p-4 text-slate-500" colspan="${cols.length}">Empty</td></tr>`}
              </tbody>
            </table>
          </div>
        </section>
      `).join('');
    }
    refresh.onclick = load;
    load();
  </script>
</body>
</html>
