<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poem Forge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen w-full">
  <div class="w-full max-w-6xl mx-auto p-4 md:p-8">
    <div class="flex flex-col gap-4 mb-6">
      <div>
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight">Poem Forge</h1>
        <p class="text-zinc-400 mt-2">Turn anything into a poem.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button data-tone="tender" class="chip">Tender</button>
        <button data-tone="moody" class="chip">Moody</button>
        <button data-tone="epic" class="chip">Epic</button>
        <button data-tone="funny" class="chip">Funny</button>
        <button id="surprise" class="chip">Surprise me</button>
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-4">
      <section class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <label class="block text-sm text-zinc-400 mb-2">Input</label>
        <textarea id="input" class="w-full h-48 rounded-xl bg-zinc-950 border border-zinc-800 p-4 outline-none focus:border-violet-500 resize-none" placeholder="Describe a feeling, memory, object, or idea..."></textarea>
        <div class="mt-4 flex flex-wrap items-center gap-3">
          <select id="style" class="rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2">
            <option>Free verse</option>
            <option>Sonnet</option>
            <option>Haiku</option>
            <option>Limerick</option>
            <option>Spoken word</option>
          </select>
          <button id="make" class="rounded-xl bg-violet-600 hover:bg-violet-500 px-4 py-2 font-semibold">Write poem</button>
        </div>
      </section>

      <section class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4">
        <div class="flex items-center justify-between gap-3 mb-2">
          <label class="text-sm text-zinc-400">Poem</label>
          <button id="copy" class="text-sm text-zinc-400 hover:text-zinc-200">Copy</button>
        </div>
        <pre id="output" class="whitespace-pre-wrap min-h-48 rounded-xl bg-zinc-950 border border-zinc-800 p-4 text-zinc-100"></pre>
      </section>
    </div>
  </div>

  <style>
    .chip{padding:.5rem .9rem;border:1px solid rgb(39 39 42);border-radius:9999px;background:rgb(24 24 27);color:#e4e4e7}
    .chip:hover{border-color:rgb(139 92 246)}
  </style>

  <script>
    const $ = s => document.querySelector(s);
    const input = $('#input'), style = $('#style'), out = $('#output');
    let tone = '';
    const promptFor = () => `Write a ${style.value.toLowerCase()} poem in a ${tone || 'creative'} tone from this input:\n${input.value.trim()}`;
    async function generate() {
      out.textContent = 'Thinking...';
      const r = await fetch('/api/ai/respond', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ prompt: promptFor(), system_prompt: 'You are a skilled poet. Return only the poem, no prefacing.', context: {} })
      });
      const j = await r.json();
      out.textContent = j.text || j.response || 'No response';
    }
    $('#make').onclick = generate;
    $('#copy').onclick = () => navigator.clipboard.writeText(out.textContent);
    $('#surprise').onclick = () => { tone = ['tender','moody','epic','funny'][Math.floor(Math.random()*4)]; generate(); };
    document.querySelectorAll('[data-tone]').forEach(b => b.onclick = () => { tone = b.dataset.tone; generate(); });
  </script>
</body>
</html>
