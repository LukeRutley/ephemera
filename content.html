<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Card for Phoeebs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-fuchsia-950 to-indigo-950 text-white overflow-hidden">
  <div class="absolute inset-0 opacity-25 pointer-events-none" style="background-image:radial-gradient(circle at 20% 20%,#fff 0 1px,transparent 1px),radial-gradient(circle at 80% 30%,#fff 0 1px,transparent 1px),radial-gradient(circle at 50% 70%,#fff 0 1px,transparent 1px);background-size:120px 120px;"></div>

  <main class="relative min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl perspective-[1200px]">
      <div id="card" class="relative w-full h-[72vh] min-h-[520px] transition-transform duration-700 ease-out cursor-pointer" style="transform-style:preserve-3d;">
        <div class="absolute inset-0 rounded-3xl shadow-2xl border border-white/10 bg-white/5 backdrop-blur-xl overflow-hidden backface-hidden">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(255,255,255,.16),transparent_45%)]"></div>
          <div class="h-full flex flex-col items-center justify-center text-center p-8">
            <div class="text-6xl mb-4">🎂</div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight">Open me, Phoeebs</h1>
            <p class="mt-4 text-white/80 max-w-md">A tiny clickable card with a rhyming-hiku surprise.</p>
            <div class="mt-8 px-5 py-3 rounded-full bg-white/10 border border-white/15">tap / click to open</div>
          </div>
        </div>

        <div class="absolute inset-0 rounded-3xl shadow-2xl border border-white/10 bg-slate-950/90 backdrop-blur-xl overflow-hidden rotate-y-180 backface-hidden" style="transform:rotateY(180deg);">
          <div class="h-full flex flex-col justify-between p-8 md:p-10">
            <div>
              <div class="text-sm uppercase tracking-[0.35em] text-fuchsia-300/80">For Phoeebs</div>
              <h2 class="mt-3 text-3xl md:text-4xl font-bold">A rhyming hiku</h2>
            </div>

            <div class="space-y-5 text-lg md:text-xl leading-relaxed text-white/90">
              <p>Sweet Phoeebs, you shine bright,</p>
              <p>Like moonbeams in the night light,</p>
              <p>My heart sings your name.</p>
            </div>

            <div class="flex items-end justify-between gap-4">
              <div class="text-white/60 text-sm">click again to close</div>
              <div class="text-4xl">💜</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const card = document.getElementById('card');
    let open = false;
    card.addEventListener('click', () => {
      open = !open;
      card.style.transform = `rotateY(${open ? 180 : 0}deg)`;
    });
  </script>
</body>
</html>
