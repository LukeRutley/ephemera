<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ephemera</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(7, 17, 31, 0.72);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f6f7fb;
      --muted: rgba(246, 247, 251, 0.72);
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --danger: rgba(248, 113, 113, 0.2);
      --field: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 50px rgba(2, 8, 23, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 24%),
        linear-gradient(145deg, #020617 0%, #07111f 50%, #0f172a 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      height: 100%;
      width: 100%;
      isolation: isolate;
    }

    .content-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .composer {
      position: fixed;
      left: 1.25rem;
      bottom: 0.75rem;
      z-index: 2;
      width: min(40rem, calc(100vw - 2rem));
      padding: 0.75rem;
      border: 1px solid var(--panel-border);
      border-radius: 1.15rem;
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 80vh;
    }

    .composer-label {
      display: block;
      margin-bottom: 0.1rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .composer-row {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }

    .composer-input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.95rem;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0.9rem 1rem;
      font: inherit;
      transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      resize: none;
      min-height: 3rem;
      max-height: 10rem;
      overflow-y: auto;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      height: 2.4rem;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
    }

    .composer-input::placeholder {
      color: rgba(246, 247, 251, 0.45);
    }

    .composer-input:focus {
      outline: none;
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.14);
    }

    .composer-secondary {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }

    .button.composer-expand-toggle {
      display: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid transparent;
      border-radius: 0.95rem;
      padding: 0.9rem 1rem;
      min-width: 5rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease, border-color 160ms ease;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #04111d;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .button-danger {
      background: var(--danger);
      color: var(--text);
      border-color: rgba(248, 113, 113, 0.22);
    }

    .button:hover:not(:disabled) {
      filter: brightness(1.05);
    }

    .spinner {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 999px;
      border: 2px solid rgba(3, 19, 29, 0.25);
      border-top-color: #03131d;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .button.is-loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-status {
      min-height: 1.25rem;
      font-size: 0.85rem;
      color: var(--accent);
      display: none;
      align-items: center;
      gap: 0.45rem;
    }

    .loading-status.is-visible {
      display: inline-flex;
    }

    .loading-status::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0.9rem rgba(125, 211, 252, 0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.45;
        transform: scale(0.82);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .back-button-floating {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      z-index: 3;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      min-width: auto;
      padding: 0.75rem 0.9rem;
    }

    .next-button-floating {
      position: fixed;
      top: 1.25rem;
      left: 4.5rem;
      z-index: 3;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      min-width: auto;
      padding: 0.75rem 0.9rem;
    }

    .maintenance-button-floating {
      background: rgba(125, 211, 252, 0.16);
      border-color: rgba(125, 211, 252, 0.3);
    }

    .top-right-controls {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 4;
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
    }

    .saved-pages-menu {
      position: relative;
    }

    .icon-button {
      position: relative;
      min-width: auto;
      width: 3rem;
      height: 3rem;
      padding: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
    }

    .icon-button .spinner {
      position: absolute;
    }

    .icon-button.is-loading .button-icon {
      opacity: 0;
    }

    .button-icon {
      width: 1.2rem;
      height: 1.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 160ms ease;
    }

    .button-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      transition: transform 220ms ease;
    }

    .back-button-floating:hover:not(:disabled),
    .next-button-floating:hover:not(:disabled),
    .icon-button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(125, 211, 252, 0.55);
    }

    .saved-pages-dropdown {
      position: absolute;
      top: calc(100% + 0.75rem);
      right: 0;
      width: min(22rem, calc(100vw - 2rem));
      padding: 0.5rem;
      border: 1px solid var(--panel-border);
      border-radius: 1rem;
      background: rgba(7, 17, 31, 0.92);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
      display: none;
    }

    .saved-pages-dropdown.is-open {
      display: block;
    }

    .saved-pages-header {
      padding: 0.55rem 0.7rem 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .saved-pages-search {
      width: 100%;
      margin-bottom: 0.45rem;
      border: 1px solid transparent;
      border-radius: 0.85rem;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0.75rem 0.85rem;
      font: inherit;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .saved-pages-search::placeholder {
      color: rgba(246, 247, 251, 0.45);
    }

    .saved-pages-search:focus {
      outline: none;
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(255, 255, 255, 0.11);
      box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.14);
    }

    .saved-pages-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      max-height: 18rem;
      overflow-y: auto;
    }

    .saved-page-item,
    .saved-pages-empty {
      width: 100%;
      padding: 0.75rem 0.8rem;
      border: 0;
      border-radius: 0.8rem;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .saved-page-item {
      cursor: pointer;
      transition: background 160ms ease;
    }

    .saved-page-item:hover,
    .saved-page-item:focus-visible {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
    }

    .saved-page-title {
      display: block;
      font-weight: 600;
      line-height: 1.3;
    }

    .saved-page-meta,
    .saved-pages-empty {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      /* Top navigation — compact */
      .back-button-floating {
        top: 0.55rem;
        left: 0.55rem;
        padding: 0.45rem 0.6rem;
        border-radius: 0.7rem;
        font-size: 0.88rem;
        min-width: 0;
      }

      .next-button-floating {
        top: 0.55rem;
        left: 2.95rem;
        padding: 0.45rem 0.6rem;
        border-radius: 0.7rem;
        font-size: 0.88rem;
        min-width: 0;
      }

      .top-right-controls {
        top: 0.55rem;
        right: 0.55rem;
        gap: 0.3rem;
      }

      .icon-button {
        width: 2.1rem;
        height: 2.1rem;
        min-width: 0;
      }

      .button-icon {
        width: 1rem;
        height: 1rem;
      }

      /* Composer — compact */
      .composer {
        left: 0.55rem;
        right: 0.55rem;
        bottom: 0.55rem;
        width: auto;
        padding: 0.55rem;
        gap: 0.4rem;
        border-radius: 0.9rem;
      }

      /* Row wraps: textarea + send on first line, secondary on next */
      .composer-row {
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: flex-end;
      }

      .composer-input {
        flex: 1 1 auto;
        padding: 0.55rem 0.75rem;
        border-radius: 0.7rem;
        font-size: 0.9rem;
      }

      #sendButton {
        flex-shrink: 0;
        padding: 0.55rem 0.85rem;
        font-size: 0.85rem;
        min-width: 0;
        border-radius: 0.7rem;
      }

      /* Toggle chevron — show on mobile */
      .composer-expand-toggle {
        display: inline-flex;
        flex-shrink: 0;
        width: 2.1rem;
        height: 2.1rem;
        min-width: 0;
      }

      .composer-expand-toggle[aria-expanded="true"] .button-icon svg {
        transform: rotate(180deg);
      }

      /* Secondary actions: full-width collapsed row */
      .composer-secondary {
        flex: 0 0 100%;
        overflow: hidden;
        max-height: 0;
        gap: 0.35rem;
        transition: max-height 220ms ease;
      }

      .composer-secondary.is-open {
        max-height: 6rem;
      }

      .composer-secondary .button {
        flex: 1;
        min-width: 0;
        padding: 0.5rem 0.5rem;
        font-size: 0.8rem;
        border-radius: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <iframe class="content-frame" id="viewer" title="Generated content"></iframe>

    <button class="button button-secondary back-button-floating" id="backButton" type="button">←</button>
    <button class="button button-secondary next-button-floating" id="nextButton" type="button">→</button>
    <div class="top-right-controls">
      <button class="button icon-button" id="savePageButton" type="button" aria-label="Save current page" title="Save current page">
        <span class="spinner" aria-hidden="true"></span>
        <span class="button-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3.75h11.5l2.75 2.75V20.25H5z"></path>
            <path d="M8 3.75v5.5h8v-5.5"></path>
            <path d="M9 15.25h6"></path>
          </svg>
        </span>
      </button>

      <div class="saved-pages-menu">
        <button class="button icon-button" id="savedPagesToggle" type="button" aria-label="Show saved pages" title="Show saved pages" aria-expanded="false">
          <span class="spinner" aria-hidden="true"></span>
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.75 4.75h10.5a1.5 1.5 0 0 1 1.5 1.5v11.5l-3.75-2-3.75 2-3.75-2-3.75 2V6.25a1.5 1.5 0 0 1 1.5-1.5z"></path>
              <path d="M8.5 8.5h7"></path>
              <path d="M8.5 12h5"></path>
            </svg>
          </span>
        </button>

        <div class="saved-pages-dropdown" id="savedPagesDropdown">
          <div class="saved-pages-header">Saved pages</div>
          <input
            class="saved-pages-search"
            id="savedPagesSearch"
            type="search"
            placeholder="Search saved pages"
            autocomplete="off"
          />
          <div class="saved-pages-list" id="savedPagesList"></div>
        </div>
      </div>

      <button class="button maintenance-button-floating icon-button" id="consolidateSchemaButton" type="button" aria-label="Compact database" title="Compact database">
        <span class="spinner" aria-hidden="true"></span>
        <span class="button-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5.5" rx="6.5" ry="2.75"></ellipse>
            <path d="M5.5 5.5v5c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75v-5"></path>
            <path d="M5.5 10.5v5c0 1.52 2.91 2.75 6.5 2.75s6.5-1.23 6.5-2.75v-5"></path>
          </svg>
        </span>
      </button>
    </div>

    <form class="composer" id="composer">
      <div class="composer-row">
        <textarea
          class="composer-input"
          id="message"
          name="message"
          autocomplete="off"
          placeholder="Enter a prompt"
        ></textarea>
        <button class="button button-primary" id="sendButton" type="submit">
          <span class="spinner" aria-hidden="true"></span>
          <span id="sendLabel">Send</span>
        </button>
        <button class="button icon-button composer-expand-toggle" id="composerExpandToggle" type="button" aria-label="More options" aria-expanded="false" title="More options">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </span>
        </button>
      </div>
      <div class="composer-secondary" id="composerSecondary">
        <button class="button button-secondary" id="tweakButton" type="button">
          <span class="spinner" aria-hidden="true"></span>
          <span id="tweakLabel">Tweak</span>
        </button>
        <button class="button button-danger" id="newTopicButton" type="button">New topic</button>
      </div>
      <div class="loading-status" id="loadingStatus" role="status" aria-live="polite"></div>
    </form>
  </div>

  <script id="initial-state" type="application/json">{{ state|tojson }}</script>
  <script id="holding-page-html" type="application/json">{{ holding_page_html|tojson }}</script>
  <script>
    const state = JSON.parse(document.getElementById("initial-state").textContent || "{}");
    const HOLDING_PAGE = JSON.parse(document.getElementById("holding-page-html").textContent || '""');
    const form = document.getElementById("composer");
    const input = document.getElementById("message");
    const viewer = document.getElementById("viewer");
    const sendButton = document.getElementById("sendButton");
    const sendLabel = document.getElementById("sendLabel");
    const tweakButton = document.getElementById("tweakButton");
    const tweakLabel = document.getElementById("tweakLabel");
    const backButton = document.getElementById("backButton");
    const nextButton = document.getElementById("nextButton");
    const newTopicButton = document.getElementById("newTopicButton");
    const savePageButton = document.getElementById("savePageButton");
    const savedPagesToggle = document.getElementById("savedPagesToggle");
    const savedPagesDropdown = document.getElementById("savedPagesDropdown");
    const savedPagesSearch = document.getElementById("savedPagesSearch");
    const savedPagesList = document.getElementById("savedPagesList");
    const consolidateSchemaButton = document.getElementById("consolidateSchemaButton");
    const loadingStatus = document.getElementById("loadingStatus");
    const composerExpandToggle = document.getElementById("composerExpandToggle");
    const composerSecondary = document.getElementById("composerSecondary");
    const DEFAULT_LOADING_MESSAGE = "Still generating the page…";

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[character]));
    }

    function formatSavedPageDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "Saved page";
      }

      return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function closeSavedPagesMenu() {
      savedPagesDropdown.classList.remove("is-open");
      savedPagesToggle.setAttribute("aria-expanded", "false");
    }

    function toggleSavedPagesMenu() {
      const isOpen = savedPagesDropdown.classList.toggle("is-open");
      savedPagesToggle.setAttribute("aria-expanded", String(isOpen));
      if (isOpen) {
        savedPagesSearch.focus();
      }
    }

    function bindViewerDismissHandler() {
      try {
        const viewerDocument = viewer.contentDocument;
        if (!viewerDocument || viewerDocument.__savedPagesDismissBound) {
          return;
        }

        viewerDocument.addEventListener("pointerdown", () => {
          closeSavedPagesMenu();
        });
        viewerDocument.__savedPagesDismissBound = true;
      } catch (error) {
        console.error(error);
      }
    }

    function renderSavedPages() {
      const savedPages = Array.isArray(state.saved_pages) ? state.saved_pages : [];
      const query = savedPagesSearch.value.trim().toLowerCase();
      const filteredPages = savedPages.filter((page) => {
        if (!query) {
          return true;
        }

        return String(page.title || "").toLowerCase().includes(query);
      });

      if (!filteredPages.length) {
        savedPagesList.innerHTML = query
          ? '<div class="saved-pages-empty">No saved pages match that search.</div>'
          : '<div class="saved-pages-empty">No saved pages yet.</div>';
        return;
      }

      savedPagesList.innerHTML = filteredPages.map((page) => `
        <button class="saved-page-item" type="button" data-saved-page-id="${page.id}">
          <span class="saved-page-title">${escapeHtml(page.title || "Untitled page")}</span>
          <span class="saved-page-meta">${escapeHtml(formatSavedPageDate(page.last_accessed_at || page.created_at))}</span>
        </button>
      `).join("");
    }

    // Auto-grow textarea
    function resizeTextarea() {
      input.style.height = "2.4rem";
      input.style.height = `${Math.min(input.scrollHeight, 160)}px`;
    }

    input.addEventListener("input", resizeTextarea);

    function renderHtml(html) {
      viewer.srcdoc = html || HOLDING_PAGE;
    }

    function syncState(nextState) {
      state.html = nextState.html || "";
      state.messages = nextState.messages || [];
      state.can_go_back = Boolean(nextState.can_go_back);
      state.can_go_forward = Boolean(nextState.can_go_forward);
      state.saved_pages = Array.isArray(nextState.saved_pages) ? nextState.saved_pages : [];
      renderHtml(state.html);
      renderSavedPages();
      backButton.disabled = !state.can_go_back;
      nextButton.disabled = !state.can_go_forward;
    }

    function setLoadingMessage(message = "") {
      const nextMessage = String(message || "").trim();
      loadingStatus.textContent = nextMessage;
      loadingStatus.classList.toggle("is-visible", Boolean(nextMessage));
    }

    function setLoading(isLoading, message = "") {
      sendButton.disabled = isLoading;
      tweakButton.disabled = isLoading;
      backButton.disabled = isLoading || !state.can_go_back;
      nextButton.disabled = isLoading || !state.can_go_forward;
      newTopicButton.disabled = isLoading;
      savePageButton.disabled = isLoading;
      savedPagesToggle.disabled = isLoading;
      consolidateSchemaButton.disabled = isLoading;
      composerExpandToggle.disabled = isLoading;
      sendButton.classList.toggle("is-loading", isLoading);
      tweakButton.classList.toggle("is-loading", isLoading);
      sendLabel.textContent = isLoading ? "Sending" : "Send";
      tweakLabel.textContent = isLoading ? "Tweaking" : "Tweak";
      setLoadingMessage(isLoading ? (message || DEFAULT_LOADING_MESSAGE) : "");
    }

    function setButtonLoading(button, isLoading) {
      button.classList.toggle("is-loading", isLoading);
      button.disabled = isLoading;
    }

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Request failed.");
      }
      return payload;
    }

    async function streamHtml(url, body = {}, onHtml) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(payload.error || "Request failed.");
      }

      if (!response.body) {
        throw new Error("Streaming response body was unavailable.");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalState = null;

      function processLine(line) {
        if (!line) {
          return;
        }

        const event = JSON.parse(line);
        if (event.type === "status") {
          setLoadingMessage(event.message || DEFAULT_LOADING_MESSAGE);
          return;
        }

        if (event.type === "html") {
          if (typeof onHtml === "function") {
            onHtml(event.html || "");
          }
          setLoadingMessage(DEFAULT_LOADING_MESSAGE);
          return;
        }

        if (event.type === "complete") {
          finalState = event.state || null;
          return;
        }

        if (event.type === "error") {
          throw new Error(event.error || "Streaming request failed.");
        }
      }

      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

        let newlineIndex = buffer.indexOf("\n");
        while (newlineIndex !== -1) {
          const line = buffer.slice(0, newlineIndex).trim();
          buffer = buffer.slice(newlineIndex + 1);
          processLine(line);
          newlineIndex = buffer.indexOf("\n");
        }

        if (done) {
          break;
        }
      }

      if (buffer.trim()) {
        processLine(buffer.trim());
      }

      if (!finalState) {
        throw new Error("Streaming request ended before completion.");
      }

      return finalState;
    }

    syncState(state);
    resizeTextarea();
    viewer.addEventListener("load", bindViewerDismissHandler);
    bindViewerDismissHandler();

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".saved-pages-menu")) {
        closeSavedPagesMenu();
      }
    });

    savedPagesToggle.addEventListener("click", () => {
      toggleSavedPagesMenu();
    });

    composerExpandToggle.addEventListener("click", () => {
      const isOpen = composerSecondary.classList.toggle("is-open");
      composerExpandToggle.setAttribute("aria-expanded", String(isOpen));
    });

    savedPagesSearch.addEventListener("input", () => {
      renderSavedPages();
    });

    savedPagesList.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-saved-page-id]");
      if (!button) {
        return;
      }

      const savedPageId = button.getAttribute("data-saved-page-id");
      if (!savedPageId) {
        return;
      }

      closeSavedPagesMenu();
      setButtonLoading(savedPagesToggle, true);

      try {
        const payload = await postJson(`/saved-pages/${savedPageId}/open`);
        syncState(payload);
      } catch (error) {
        console.error(error);
      } finally {
        setButtonLoading(savedPagesToggle, false);
      }
    });

    savePageButton.addEventListener("click", async () => {
      setButtonLoading(savePageButton, true);

      try {
        const payload = await postJson("{{ url_for('create_saved_page') }}");
        syncState(payload);
        savedPagesDropdown.classList.add("is-open");
        savedPagesToggle.setAttribute("aria-expanded", "true");
        savedPagesSearch.focus();
      } catch (error) {
        console.error(error);
        window.alert(error instanceof Error ? error.message : "Saving page failed.");
      } finally {
        setButtonLoading(savePageButton, false);
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = input.value.trim();
      if (!message) {
        return;
      }

      const previousHtml = state.html || "";
      setLoading(true, "Generating your page…");

      try {
        const payload = await streamHtml("{{ url_for('send_stream') }}", { message }, (html) => {
          state.html = html || "";
          renderHtml(state.html);
        });
        syncState(payload);
        input.value = "";
        resizeTextarea();
      } catch (error) {
        console.error(error);
        state.html = previousHtml;
        renderHtml(state.html);
      } finally {
        setLoading(false);
      }
    });

    tweakButton.addEventListener("click", async () => {
      const message = input.value.trim();
      if (!message) {
        return;
      }

      const previousHtml = state.html || "";
      setLoading(true, "Tweaking your page…");

      try {
        const payload = await streamHtml("{{ url_for('tweak_stream') }}", { message }, (html) => {
          state.html = html || "";
          renderHtml(state.html);
        });
        syncState(payload);
        input.value = "";
        resizeTextarea();
      } catch (error) {
        console.error(error);
        state.html = previousHtml;
        renderHtml(state.html);
      } finally {
        setLoading(false);
      }
    });

    backButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('back') }}");
        syncState(payload);
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    newTopicButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('new_topic') }}");
        syncState(payload);
        resizeTextarea();
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    nextButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('next_page') }}");
        syncState(payload);
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    consolidateSchemaButton.addEventListener("click", async () => {
      setButtonLoading(consolidateSchemaButton, true);

      try {
        const payload = await postJson("{{ url_for('consolidate_schema') }}");
        window.alert(payload.summary || "Database schema consolidation completed.");
      } catch (error) {
        console.error(error);
        window.alert(error instanceof Error ? error.message : "Schema consolidation failed.");
      } finally {
        setButtonLoading(consolidateSchemaButton, false);
      }
    });
  </script>
</body>
