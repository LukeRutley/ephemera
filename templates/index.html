<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No SaaS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(7, 17, 31, 0.72);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f6f7fb;
      --muted: rgba(246, 247, 251, 0.72);
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --danger: rgba(248, 113, 113, 0.2);
      --field: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 50px rgba(2, 8, 23, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 24%),
        linear-gradient(145deg, #020617 0%, #07111f 50%, #0f172a 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      height: 100%;
      width: 100%;
      isolation: isolate;
    }

    .content-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .composer {
      position: fixed;
      left: 1.25rem;
      bottom: 0.75rem;
      z-index: 2;
      width: min(28rem, calc(100vw - 2rem));
      padding: 0.75rem;
      border: 1px solid var(--panel-border);
      border-radius: 1.15rem;
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 80vh;
    }

    .composer-label {
      display: block;
      margin-bottom: 0.1rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .composer-row {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }

    .composer-input {
      flex: 1;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 0.95rem;
      background: var(--field);
      color: var(--text);
      padding: 0.9rem 1rem;
      font: inherit;
      transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      resize: none;
      min-height: 3rem;
      max-height: 10rem;
      overflow-y: auto;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      height: 2.4rem;
    }

    .composer-input::placeholder {
      color: rgba(246, 247, 251, 0.45);
    }

    .composer-input:focus {
      outline: none;
      border-color: rgba(125, 211, 252, 0.55);
      background: rgba(255, 255, 255, 0.11);
      box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.14);
    }

    .actions {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid transparent;
      border-radius: 0.95rem;
      padding: 0.9rem 1rem;
      min-width: 5rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease, border-color 160ms ease;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #04111d;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .button-danger {
      background: var(--danger);
      color: var(--text);
      border-color: rgba(248, 113, 113, 0.22);
    }

    .button:hover:not(:disabled) {
      filter: brightness(1.05);
    }

    .spinner {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 999px;
      border: 2px solid rgba(3, 19, 29, 0.25);
      border-top-color: #03131d;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .button.is-loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .back-button-floating {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      z-index: 3;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      min-width: auto;
      padding: 0.75rem 0.9rem;
    }

    .next-button-floating {
      position: fixed;
      top: 1.25rem;
      left: 4.5rem;
      z-index: 3;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      min-width: auto;
      padding: 0.75rem 0.9rem;
    }

    .back-button-floating:hover:not(:disabled),
    .next-button-floating:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(125, 211, 252, 0.55);
    }

    @media (max-width: 640px) {
      .composer {
        left: 0.75rem;
        right: 0.75rem;
        bottom: 0.75rem;
        width: auto;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button {
        width: 100%;
        min-width: 0;
      }

      .composer-row {
        flex-direction: column;
        align-items: stretch;
      }

      .back-button-floating {
        top: 0.75rem;
        left: 0.75rem;
      }

      .next-button-floating {
        top: 0.75rem;
        left: 4rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <iframe class="content-frame" id="viewer" title="Generated content"></iframe>

    <button class="button button-secondary back-button-floating" id="backButton" type="button">←</button>
    <button class="button button-secondary next-button-floating" id="nextButton" type="button">→</button>

    <form class="composer" id="composer">
      <div class="composer-row">
        <textarea
          class="composer-input"
          id="message"
          name="message"
          autocomplete="off"
          placeholder="Enter a prompt"
        ></textarea>
        <div class="actions">
          <button class="button button-primary" id="sendButton" type="submit">
            <span class="spinner" aria-hidden="true"></span>
            <span id="sendLabel">Send</span>
          </button>
          <button class="button button-danger" id="newTopicButton" type="button">New topic</button>
        </div>
      </div>
    </form>
  </div>

  <script id="initial-state" type="application/json">{{ state|tojson }}</script>
  <script id="holding-page-html" type="application/json">{{ holding_page_html|tojson }}</script>
  <script>
    const state = JSON.parse(document.getElementById("initial-state").textContent || "{}");
    const HOLDING_PAGE = JSON.parse(document.getElementById("holding-page-html").textContent || '""');
    const form = document.getElementById("composer");
    const input = document.getElementById("message");
    const viewer = document.getElementById("viewer");
    const sendButton = document.getElementById("sendButton");
    const sendLabel = document.getElementById("sendLabel");
    const backButton = document.getElementById("backButton");
    const nextButton = document.getElementById("nextButton");
    const newTopicButton = document.getElementById("newTopicButton");

    // Auto-grow textarea
    function resizeTextarea() {
      input.style.height = "2.4rem";
      input.style.height = `${Math.min(input.scrollHeight, 160)}px`;
    }

    input.addEventListener("input", resizeTextarea);

    function renderHtml(html) {
      viewer.srcdoc = html || HOLDING_PAGE;
    }

    function syncState(nextState) {
      state.html = nextState.html || "";
      state.messages = nextState.messages || [];
      state.can_go_back = Boolean(nextState.can_go_back);
      state.can_go_forward = Boolean(nextState.can_go_forward);
      renderHtml(state.html);
      backButton.disabled = !state.can_go_back;
      nextButton.disabled = !state.can_go_forward;
    }

    function setLoading(isLoading) {
      sendButton.disabled = isLoading;
      backButton.disabled = isLoading || !state.can_go_back;
      nextButton.disabled = isLoading || !state.can_go_forward;
      newTopicButton.disabled = isLoading;
      sendButton.classList.toggle("is-loading", isLoading);
      sendLabel.textContent = isLoading ? "Sending" : "Send";
    }

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Request failed.");
      }
      return payload;
    }

    syncState(state);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = input.value.trim();
      if (!message) {
        return;
      }

      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('send') }}", { message });
        syncState(payload);
        input.value = "";
        resizeTextarea();
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    backButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('back') }}");
        syncState(payload);
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    newTopicButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('new_topic') }}");
        syncState(payload);
        resizeTextarea();
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });

    nextButton.addEventListener("click", async () => {
      setLoading(true);

      try {
        const payload = await postJson("{{ url_for('next_page') }}");
        syncState(payload);
      } catch (error) {
        console.error(error);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
