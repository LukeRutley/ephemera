<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #020617; overflow: hidden; }
    canvas { display: block; }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      pointer-events: none;
    }
    .glyph {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: rgba(125, 211, 252, 0.12);
      letter-spacing: 0.15em;
      animation: drift 8s ease-in-out infinite;
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
      font-weight: 100;
    }
    .hint {
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
      font-size: clamp(0.65rem, 1.8vw, 0.8rem);
      color: rgba(125, 211, 252, 0.3);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.65; }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.08; }
      50% { transform: translateY(-12px) scale(1.04); opacity: 0.18; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="glyph">&#9672; &#9632; &#9650;</div>
    <div class="hint">Ephemera</div>
  </div>
  <script>
    const cvs = document.getElementById("c");
    const ctx = cvs.getContext("2d");
    let width;
    let height;
    let time = 0;
    let particles = [];
    let orbs = [];

    function resize() {
      width = cvs.width = window.innerWidth;
      height = cvs.height = window.innerHeight;
    }

    function noise(x, y, tick) {
      return (
        Math.sin(x * 0.016 + tick * 0.6) +
        Math.sin(y * 0.014 + tick * 0.42) +
        Math.sin((x - y) * 0.011 + tick * 0.78) +
        Math.sin(Math.hypot(x - width / 2, y - height / 2) * 0.013 - tick * 1.1)
      ) * 0.25;
    }

    function init() {
      resize();
      particles = Array.from({ length: 220 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 1.6 + 0.2,
        speed: Math.random() * 0.55 + 0.18,
        hue: Math.random() * 50 + 185,
        phase: Math.random() * Math.PI * 2,
      }));
      orbs = [
        { x: width * 0.2, y: height * 0.3, radius: Math.min(width, height) * 0.28, hue: 200 },
        { x: width * 0.8, y: height * 0.7, radius: Math.min(width, height) * 0.22, hue: 220 },
        { x: width * 0.55, y: height * 0.18, radius: Math.min(width, height) * 0.18, hue: 195 },
      ];
    }

    function drawFrame() {
      time += 0.007;

      ctx.fillStyle = "rgba(2, 6, 23, 0.14)";
      ctx.fillRect(0, 0, width, height);

      for (const orb of orbs) {
        const orbX = orb.x + Math.sin(time * 0.31 + orb.hue) * width * 0.06;
        const orbY = orb.y + Math.cos(time * 0.23 + orb.hue) * height * 0.06;
        const gradient = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orb.radius);
        gradient.addColorStop(0, `hsla(${orb.hue}, 80%, 62%, 0.04)`);
        gradient.addColorStop(0.5, `hsla(${orb.hue}, 70%, 55%, 0.025)`);
        gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(orbX, orbY, orb.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const particle of particles) {
        const angle = noise(particle.x, particle.y, time) * Math.PI * 3.6;
        particle.x += Math.cos(angle) * particle.speed;
        particle.y += Math.sin(angle) * particle.speed;

        if (particle.x < -4) particle.x = width + 4;
        if (particle.x > width + 4) particle.x = -4;
        if (particle.y < -4) particle.y = height + 4;
        if (particle.y > height + 4) particle.y = -4;

        particle.phase += 0.018;
        const alpha = (Math.sin(particle.phase) * 0.4 + 0.55) * 0.55;
        const lightness = 65 + Math.sin(particle.phase * 1.3) * 12;
        const hue = particle.hue + Math.sin(time * 0.8 + particle.phase) * 25;

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 70%, ${lightness}%, ${alpha})`;
        ctx.fill();
      }

      for (let firstIndex = 0; firstIndex < particles.length - 1; firstIndex += 1) {
        const first = particles[firstIndex];
        for (let secondIndex = firstIndex + 1; secondIndex < particles.length; secondIndex += 1) {
          const second = particles[secondIndex];
          const distance = Math.hypot(first.x - second.x, first.y - second.y);
          if (distance >= 72) {
            continue;
          }

          ctx.beginPath();
          ctx.moveTo(first.x, first.y);
          ctx.lineTo(second.x, second.y);
          ctx.strokeStyle = `rgba(56, 189, 248, ${(1 - distance / 72) * 0.07})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }

      const vignette = ctx.createRadialGradient(
        width / 2,
        height / 2,
        height * 0.15,
        width / 2,
        height / 2,
        height * 0.75,
      );
      vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
      vignette.addColorStop(1, "rgba(2, 6, 23, 0.55)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);

      window.requestAnimationFrame(drawFrame);
    }

    window.addEventListener("resize", init);
    init();
    drawFrame();
  </script>
</body>
</html>
